<div class="p-4 space-y-4 bg-white border-t border-slate-100">
  <div class="flex gap-2">
    <button (click)="downloadSVG()"
      class="flex-1 border py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-md hover:bg-[#ff9100] hover:text-white transition-all">
      Download SVG
    </button>
    <button (click)="copyBase64()"
      class="flex-1 border py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-md hover:bg-[#ff9100] hover:text-white transition-all">
      Copy Base64
    </button>
  </div>
  
  <button (click)="addToProject()"
    class="w-full bg-[#ff9100] text-white py-3 rounded-xl font-black text-xs uppercase tracking-[0.2em] shadow-lg hover:brightness-110 active:scale-95 transition-all">
    Add to Project
  </button>
</div>
